version: '3.8'

services:
  expert-consultation:
    build:
      context: ./backend/python-ai-services
      dockerfile: expert_consultation/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://vital:${POSTGRES_PASSWORD}@postgres:5432/vital_expert_consultation
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SERVICE_PORT=8001
      - SERVICE_HOST=0.0.0.0
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - DEFAULT_BUDGET=50.0
      - MAX_BUDGET=500.0
      - COST_WARNING_THRESHOLD=0.8
      - MAX_ITERATIONS=10
      - DEFAULT_TIMEOUT=300
      - REASONING_MODE=react
      - LOG_LEVEL=INFO
      - ENABLE_METRICS=true
      - METRICS_PORT=9090
      - PYTHONPATH=/app
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=vital_expert_consultation
      - POSTGRES_USER=vital
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  default:
    name: vital-expert-consultation
