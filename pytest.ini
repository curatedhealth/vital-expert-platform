# pytest configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    
# Coverage settings
addopts =
    --verbose
    --tb=short
    --cov=scripts
    --cov-report=html
    --cov-report=term-missing
    --cov-branch

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

