[pytest]
# Pytest configuration for knowledge pipeline tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (slower, may use mocks)
    slow: Slow tests (live API calls, requires internet)
    asyncio: Async tests

# Output
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --cov=scripts
    --cov=services/ai-engine/src/services/knowledge
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --asyncio-mode=auto

# Async support
asyncio_mode = auto

# Coverage
[coverage:run]
source = 
    scripts
    services/ai-engine/src/services/knowledge
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Exclude lines
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
